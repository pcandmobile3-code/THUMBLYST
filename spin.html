<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Spin | Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
.t-container { max-width:500px; margin:0 auto; }

.coins-bar {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--radius); padding:16px 20px; margin:16px 0;
  box-shadow:0 0 20px rgba(0,240,255,0.06);
  animation:borderGlow 3s ease-in-out infinite;
}
.coins-label { font-family:var(--font-display); font-size:9px; font-weight:800; letter-spacing:3px; color:var(--text3); text-transform:uppercase; }
.coins-value { font-family:var(--font-mono); font-size:26px; font-weight:700; color:var(--yellow); display:flex; align-items:center; gap:8px; margin-top:4px; text-shadow:0 0 14px rgba(255,214,0,0.4); }
.icon-coin { width:24px; height:24px; fill:var(--yellow); }

.wheel-wrap { display:flex; flex-direction:column; align-items:center; padding:20px 0 12px; }
.wheel-container { position:relative; width:300px; height:300px; }
#wheelCanvas {
  width:300px; height:300px; border-radius:50%;
  box-shadow:0 0 0 4px var(--bg3), 0 0 0 8px var(--border), 0 0 40px rgba(0,240,255,0.2), 0 20px 60px rgba(0,0,0,0.5);
}
.wheel-pointer {
  position:absolute; top:-14px; left:50%; transform:translateX(-50%);
  width:0; height:0;
  border-left:14px solid transparent; border-right:14px solid transparent;
  border-top:26px solid var(--cyan); z-index:10;
  filter:drop-shadow(0 0 6px rgba(0,240,255,0.8));
}
.wheel-center {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:52px; height:52px; border-radius:50%;
  background:var(--bg); border:2px solid var(--border2);
  display:flex; align-items:center; justify-content:center; z-index:5;
  box-shadow:0 0 14px rgba(0,240,255,0.3);
}
.wheel-center svg { width:26px; height:26px; fill:var(--cyan); }

.spin-btn {
  margin:28px auto 0; display:block; width:100%; max-width:280px; padding:17px;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  color:#000; border:none; border-radius:14px;
  font-family:var(--font-display); font-size:13px; font-weight:900;
  letter-spacing:4px; text-transform:uppercase; cursor:pointer;
  transition:var(--spring); box-shadow:0 0 24px rgba(0,240,255,0.4);
}
.spin-btn:active { transform:scale(0.96); }
.spin-btn:disabled { opacity:0.2; cursor:not-allowed; box-shadow:none; transform:scale(1); }

.countdown-wrap { text-align:center; margin-top:16px; }
.countdown-label { font-family:var(--font-display); font-size:9px; font-weight:800; letter-spacing:3px; color:var(--text3); text-transform:uppercase; }
.countdown-timer { font-family:var(--font-mono); font-size:26px; font-weight:700; color:var(--cyan); margin-top:4px; letter-spacing:4px; text-shadow:0 0 14px rgba(0,240,255,0.4); }

.prize-list { background:var(--bg2); border:1px solid var(--border); border-radius:18px; overflow:hidden; margin:20px 0; }
.prize-item { display:flex; align-items:center; gap:14px; padding:14px 20px; border-bottom:1px solid var(--border); }
.prize-item:last-child { border-bottom:none; }
.prize-icon-box { width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
.prize-icon-box svg { width:100%; height:100%; fill:var(--cyan); }
.prize-name { flex:1; font-family:var(--font-display); font-size:13px; font-weight:700; color:var(--text); letter-spacing:0.5px; }
.prize-chance {
  font-family:var(--font-display); font-size:8px; font-weight:800; letter-spacing:1.5px;
  color:var(--text3); text-transform:uppercase;
  background:var(--bg3); border:1px solid var(--border); border-radius:5px; padding:3px 8px;
}
.prize-chance.hot { color:var(--yellow); background:rgba(255,214,0,0.08); border-color:rgba(255,214,0,0.2); }
.prize-chance.rare { color:var(--purple); background:rgba(192,38,211,0.08); border-color:rgba(192,38,211,0.2); }

.store-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.store-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:16px;
  padding:18px; display:flex; flex-direction:column; align-items:flex-start;
  gap:8px; transition:var(--transition); cursor:pointer;
}
.store-card:active { transform:scale(0.97); border-color:var(--border2); }
.store-icon { width:28px; height:28px; fill:var(--cyan); }
.store-name { font-family:var(--font-display); font-size:12px; font-weight:800; color:var(--text); line-height:1.4; letter-spacing:0.5px; }
.store-cost { font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--yellow); display:flex; align-items:center; gap:4px; }
.store-btn {
  width:100%; margin-top:6px; padding:9px;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2)); color:#000;
  border:none; border-radius:9px;
  font-family:var(--font-display); font-size:9px; font-weight:900;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer;
}

/* WIN OVERLAY */
.win-overlay {
  position:fixed; inset:0; background:rgba(9,12,16,0.97); z-index:2000;
  display:none; align-items:center; justify-content:center;
  flex-direction:column; padding:40px; text-align:center;
  backdrop-filter:blur(12px);
}
.win-overlay.active { display:flex; animation:scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
.win-glow-ring {
  width:120px; height:120px; border-radius:50%;
  background:rgba(255,214,0,0.08); border:2px solid rgba(255,214,0,0.3);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 40px rgba(255,214,0,0.3), 0 0 80px rgba(255,214,0,0.1);
  animation:pulse 2s ease infinite;
}
.win-icon-large { width:60px; height:60px; fill:var(--yellow); }
.win-label { font-family:var(--font-display); font-size:10px; font-weight:900; letter-spacing:5px; color:var(--text3); text-transform:uppercase; margin-top:24px; }
.win-prize { font-family:var(--font-display); font-size:30px; font-weight:900; color:var(--yellow); margin-top:8px; line-height:1.1; text-shadow:0 0 20px rgba(255,214,0,0.5); }
.confetti-piece { position:fixed; width:9px; height:9px; border-radius:2px; animation:confettiFall linear forwards; pointer-events:none; z-index:2001; }
</style>
</head>
<body>

<div id="header"></div>

<div class="t-container t-container--pad">
  <div class="coins-bar">
    <div>
      <div class="coins-label">Your Balance</div>
      <div class="coins-value">
        <svg class="icon-coin" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.45 12.1c-1.32.43-2.45.16-3.09-.48l-1.06 1.06c.99.99 2.56 1.34 4.15.82 1.59-.51 2.51-1.78 2.51-3.1 0-1.07-.63-1.89-1.86-2.28L12 9.5c-1-.31-1.42-.71-1.42-1.18 0-.58.55-1.03 1.45-1.03 1.1 0 1.88.39 2.45.96l1.06-1.06c-.84-.84-2.14-1.27-3.51-1.27-1.83 0-3.19 1.12-3.19 2.72 0 1.08.64 1.84 1.82 2.23l2.12.7c1.07.35 1.58.74 1.58 1.42.01.7-.56 1.11-1.46 1.11z"/></svg>
        <span id="coinVal">0</span>
      </div>
    </div>
    <svg style="width:32px;height:32px;opacity:0.08;fill:var(--cyan)" viewBox="0 0 24 24"><path d="M11.5 2C6.81 2 3 5.81 3 10.5c0 3.59 2.23 6.66 5.36 7.92L7.61 21.5 10 21l1.5 1 1.5-1 2.39.5-.75-3.08C17.77 17.16 20 14.09 20 10.5 20 5.81 16.19 2 11.5 2z"/></svg>
  </div>

  <div class="wheel-wrap">
    <div class="wheel-container">
      <div class="wheel-pointer"></div>
      <canvas id="wheelCanvas" width="600" height="600"></canvas>
      <div class="wheel-center" id="centerIcon"></div>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="doSpin()">▶ SPIN NOW</button>
    <div class="countdown-wrap" id="countdownWrap" style="display:none">
      <div class="countdown-label">Next spin in</div>
      <div class="countdown-timer" id="countdownTimer">00:00:00</div>
    </div>
  </div>

  <div class="t-section-title">Today's Rewards</div>
  <div class="prize-list" id="prizeList"></div>

  <div class="t-section-title">Coin Store</div>
  <div class="store-grid" id="storeGrid"></div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-glow-ring"><div id="winIconContainer" class="win-icon-large"></div></div>
  <div class="win-label">YOU WON</div>
  <div class="win-prize" id="winPrize"></div>
  <button class="spin-btn" onclick="closeWin()" style="margin-top:36px;max-width:200px">AWESOME!</button>
</div>

<div id="footer"></div>

<script>
document.getElementById('shared').textContent = SHARED_CSS;
document.getElementById('header').innerHTML = headerHTML('SPIN');
document.getElementById('footer').innerHTML = footerHTML();

const SVGS = {
  coin:`<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.45 12.1c-1.32.43-2.45.16-3.09-.48l-1.06 1.06c.99.99 2.56 1.34 4.15.82 1.59-.51 2.51-1.78 2.51-3.1 0-1.07-.63-1.89-1.86-2.28L12 9.5c-1-.31-1.42-.71-1.42-1.18 0-.58.55-1.03 1.45-1.03 1.1 0 1.88.39 2.45.96l1.06-1.06c-.84-.84-2.14-1.27-3.51-1.27-1.83 0-3.19 1.12-3.19 2.72 0 1.08.64 1.84 1.82 2.23l2.12.7c1.07.35 1.58.74 1.58 1.42.01.7-.56 1.11-1.46 1.11z"/></svg>`,
  gift:`<svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1a2.5 2.5 0 00-5 0c0 .35.07.69.18 1H11a2.5 2.5 0 00-5 0c0 .35.07.69.18 1H4c-1.11 0-2 .89-2 2v11c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z"/></svg>`,
  game:`<svg viewBox="0 0 24 24"><path d="M21 6H3a2 2 0 00-2 2v8a2 2 0 002 2h18a2 2 0 002-2V8a2 2 0 00-2-2zM10 13H8v2H6v-2H4v-2h2V9h2v2h2v2zm5.5 2a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm3-3a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>`,
  tag:`<svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.53 2 11 2H4C2.9 2 2 2.9 2 4v7c0 .53.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58s1.05-.22 1.41-.59l7-7C21.78 13.64 22 13.11 22 12.58S21.78 11.94 21.41 11.58zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>`,
  star:`<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`,
  diamond:`<svg viewBox="0 0 24 24"><path d="M19 3H5L2 9l10 12L22 9l-3-6zm-2 0l2 4h-4l-1-4h3zM5 7H3.5l2-4H9L8 7H5zm4 0l1-4h4l1 4H9zm6 0l1-4h2.5l-2 4H15z"/></svg>`,
  refresh:`<svg viewBox="0 0 24 24"><path d="M17.65 6.35A8 8 0 1019.73 14H17.65A6 6 0 116 12a6 6 0 016-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>`,
  trophy:`<svg viewBox="0 0 24 24"><path d="M18 2H6v2H2v5a5 5 0 005 5 5 5 0 004 1.9V18H9v2h6v-2h-2v-2.1A5 5 0 0017 14a5 5 0 005-5V4h-4V2zM4 9V6h2v5.38A3 3 0 014 9zm16 0a3 3 0 01-2 2.38V6h2v3z"/></svg>`,
  palette:`<svg viewBox="0 0 24 24"><path d="M12 2A10 10 0 002 12a10 10 0 0010 10 1 1 0 001-1 1 1 0 00-.3-.71 1 1 0 010-1.41A1 1 0 0114 18h2a5 5 0 005-5c0-5.42-4.03-9-9-11zM6.5 13a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm3-3a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm5 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm3 3a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>`
};

document.getElementById('centerIcon').innerHTML = `<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:var(--cyan)"><path d="M21 6H3a2 2 0 00-2 2v8a2 2 0 002 2h18a2 2 0 002-2V8a2 2 0 00-2-2zM10 13H8v2H6v-2H4v-2h2V9h2v2h2v2zm5.5 2a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm3-3a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>`;

const DEFAULT_ITEMS = [
  { svg:'coin', label:'50 Coins', type:'coins', value:50, chance:0.10 },
  { svg:'gift', label:'Free Thumb', type:'free_thumb', value:1, chance:0.005 },
  { svg:'coin', label:'20 Coins', type:'coins', value:20, chance:0.18 },
  { svg:'tag', label:'5% OFF', type:'coupon', value:5, chance:0.08 },
  { svg:'coin', label:'10 Coins', type:'coins', value:10, chance:0.25 },
  { svg:'star', label:'10% OFF', type:'coupon', value:10, chance:0.05 },
  { svg:'diamond', label:'PFP Pack', type:'free_pack', value:'pfp', chance:0.02 },
  { svg:'refresh', label:'Try Again', type:'nothing', value:0, chance:0.30 },
  { svg:'coin', label:'100 Coins', type:'coins', value:100, chance:0.045 },
  { svg:'trophy', label:'15% OFF', type:'coupon', value:15, chance:0.025 },
];
const STORE_ITEMS = [
  { svg:'palette', name:'5% Discount', cost:100, type:'coupon', value:5 },
  { svg:'star', name:'10% Discount', cost:200, type:'coupon', value:10 },
  { svg:'gift', name:'Free Token', cost:500, type:'free_thumb', value:1 },
  { svg:'trophy', name:'GFX Master Pack', cost:800, type:'free_pack', value:'pack1' },
];

// WHEEL COLORS — neon cyber palette
const SEG_COLORS = ['#0d1117','#0a1520','#0e1623','#091018','#101c28','#0c1420','#0f1824','#091218','#0d1520','#0b1422'];
const SEG_BORDER = ['#00f0ff','#c026d3','#00ff88','#ffd600','#00f0ff','#ff3860','#c026d3','#00f0ff','#00ff88','#ffd600'];

let USER=null, userCoins=0, WHEEL_ITEMS=DEFAULT_ITEMS, spinning=false, currentAngle=0;
let app; try { app = firebase.app(); } catch(e) { firebase.initializeApp(firebaseConfig); }
const auth=firebase.auth(), db=firebase.firestore();

auth.onAuthStateChanged(async u => {
  if (!u) { await auth.signInAnonymously().catch(()=>{}); return; }
  USER=u; listenToBalance(); drawWheel(); buildLists(); checkAvailability();
});

function listenToBalance() {
  db.collection('users').doc(USER.uid).onSnapshot(doc => {
    userCoins = doc.exists ? (doc.data().coins||0) : 0;
    document.getElementById('coinVal').textContent = userCoins;
  }, ()=>{});
}

function drawWheel(rotationRad=0) {
  const canvas=document.getElementById('wheelCanvas');
  const ctx=canvas.getContext('2d');
  const W=600,cx=W/2,cy=W/2,r=W/2-12;
  const n=WHEEL_ITEMS.length, arc=(Math.PI*2)/n;
  ctx.clearRect(0,0,W,W);
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(rotationRad); ctx.translate(-cx,-cy);
  WHEEL_ITEMS.forEach((item,i) => {
    const start=arc*i-Math.PI/2, end=start+arc;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
    ctx.fillStyle=SEG_COLORS[i%SEG_COLORS.length]; ctx.fill();
    ctx.strokeStyle=SEG_BORDER[i%SEG_BORDER.length]; ctx.lineWidth=2; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(start+arc/2); ctx.textAlign='right';
    ctx.font='900 18px "Exo 2",sans-serif';
    // text shadow effect
    ctx.shadowColor=SEG_BORDER[i%SEG_BORDER.length]; ctx.shadowBlur=8;
    ctx.fillStyle=SEG_BORDER[i%SEG_BORDER.length];
    ctx.fillText(item.label.toUpperCase(),r-38,7); ctx.restore();
  });
  // outer ring glow
  ctx.strokeStyle='rgba(0,240,255,0.25)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(cx,cy,r+2,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function weightedRandom() {
  const total=WHEEL_ITEMS.reduce((s,i)=>s+(i.chance||0.1),0);
  let r=Math.random()*total, sum=0;
  for(let i=0;i<WHEEL_ITEMS.length;i++) { sum+=(WHEEL_ITEMS[i].chance||0.1); if(r<=sum) return i; }
  return 0;
}

async function doSpin() {
  if(spinning||!USER) return;
  spinning=true; document.getElementById('spinBtn').disabled=true;
  const winIdx=weightedRandom();
  const arc=360/WHEEL_ITEMS.length;
  const targetRot=360*6+(360-winIdx*arc-arc/2);
  const start=performance.now(), dur=4200;
  function animate(now) {
    const elapsed=now-start, progress=Math.min(elapsed/dur,1);
    const ease=1-Math.pow(1-progress,4);
    drawWheel((currentAngle+targetRot*ease)*Math.PI/180);
    if(progress<1) requestAnimationFrame(animate);
    else { currentAngle=(currentAngle+targetRot)%360; spinning=false; handleWin(winIdx); }
  }
  requestAnimationFrame(animate);
}

async function handleWin(idx) {
  const prize=WHEEL_ITEMS[idx];
  const isRare=prize.chance<0.05;
  try {
    await db.collection('users').doc(USER.uid).set({lastSpin:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    if(prize.type==='coins') await db.collection('users').doc(USER.uid).update({coins:firebase.firestore.FieldValue.increment(prize.value)});
    else if(prize.type==='coupon') {
      await db.collection('users').doc(USER.uid).collection('coupons').add({
        code:'SPIN'+prize.value+Math.random().toString(36).substr(2,4).toUpperCase(),
        discount:prize.value, type:'percent', validUntil:new Date(Date.now()+604800000)
      });
    }
  } catch(e) {}
  if(isRare) spawnConfetti();
  document.getElementById('winIconContainer').innerHTML=`<svg class="win-icon-large" viewBox="0 0 24 24">${SVGS[prize.svg].replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>`;
  document.getElementById('winPrize').textContent=prize.label;
  document.getElementById('winOverlay').classList.add('active');
  checkAvailability();
}

function buildLists() {
  document.getElementById('prizeList').innerHTML=WHEEL_ITEMS.map(item=>`
    <div class="prize-item">
      <div class="prize-icon-box">${SVGS[item.svg]}</div>
      <span class="prize-name">${item.label}</span>
      <span class="prize-chance ${item.chance<0.05?'rare':item.chance<0.15?'hot':''}">${item.chance<0.02?'ULTRA RARE':item.chance<0.06?'RARE':item.chance<0.15?'UNCOMMON':'COMMON'}</span>
    </div>`).join('');
  document.getElementById('storeGrid').innerHTML=STORE_ITEMS.map((item,i)=>`
    <div class="store-card" onclick="redeemStore(${i})">
      <div class="store-icon">${SVGS[item.svg]}</div>
      <div class="store-name">${item.name}</div>
      <div class="store-cost">⚡ ${item.cost} coins</div>
      <button class="store-btn">REDEEM</button>
    </div>`).join('');
}

async function checkAvailability() {
  try {
    const doc=await db.collection('users').doc(USER.uid).get();
    const last=doc.exists&&doc.data().lastSpin?doc.data().lastSpin.toDate():null;
    if(last&&(new Date()-last<86400000)) {
      const next=new Date(last.getTime()+86400000);
      document.getElementById('spinBtn').disabled=true; document.getElementById('spinBtn').textContent='LOCKED';
      document.getElementById('countdownWrap').style.display='block';
      startCountdown(next);
    }
  } catch(e) {}
}

function startCountdown(target) {
  clearInterval(window._spinTimer);
  window._spinTimer=setInterval(()=>{
    const diff=target-new Date();
    if(diff<=0){clearInterval(window._spinTimer);location.reload();}
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    document.getElementById('countdownTimer').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },1000);
}

function spawnConfetti() {
  const cols=['#00f0ff','#c026d3','#00ff88','#ffd600','#ff3860'];
  for(let i=0;i<60;i++) {
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw'; el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.animationDuration=(1+Math.random()*2)+'s'; el.style.animationDelay=Math.random()*0.5+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),3500);
  }
}

function closeWin() { document.getElementById('winOverlay').classList.remove('active'); }

async function redeemStore(i) {
  const item=STORE_ITEMS[i];
  if(userCoins<item.cost){showToast('Not enough coins!','warning');return;}
  if(!confirm(`Spend ${item.cost} coins for ${item.name}?`)) return;
  try {
    await db.collection('users').doc(USER.uid).update({coins:firebase.firestore.FieldValue.increment(-item.cost)});
    if(item.type==='coupon') {
      await db.collection('users').doc(USER.uid).collection('coupons').add({
        code:'STORE'+item.value+Math.random().toString(36).substr(2,4).toUpperCase(),
        discount:item.value, type:'percent', validUntil:new Date(Date.now()+2592000000)
      });
    }
    showToast('Redeemed! Check your coupons.','success');
  } catch(e){ showToast('Redeem failed','error'); }
}

// init sidebar
const overlay=document.getElementById('overlay'),sidebar=document.getElementById('sidebar');
window.toggleSidebar=()=>{sidebar.classList.toggle('active');overlay.classList.toggle('active');document.body.style.overflow=sidebar.classList.contains('active')?'hidden':'';};
if(overlay)overlay.addEventListener('click',toggleSidebar);
</script>
</body>
