<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin | Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
.admin-header {
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}
.admin-header h1 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 2px;
  color: #0a0a0a;
}
.admin-container {
  max-width: 560px;
  margin: 0 auto;
  padding: 40px 20px;
  text-align: center;
}

/* WARNING SIGN */
.warning-sign {
  width: 110px;
  height: 110px;
  margin: 0 auto 30px;
  animation: flash 0.6s infinite alternate ease-in-out;
}
.warning-sign svg {
  width: 100%;
  height: 100%;
}

/* BOMB */
.bomb-container {
  margin: 0 auto 40px;
  width: 160px;
  height: 160px;
  position: relative;
}
.bomb-svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 8px 20px rgba(180,0,0,0.5));
}
.timer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -40%);
  font-size: 48px;
  font-weight: 900;
  color: #ff0;
  text-shadow: 0 0 20px #ff0, 0 0 40px #f00;
  z-index: 10;
  pointer-events: none;
}

/* FUSE */
.fuse {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 48px;
  background: linear-gradient(#ff8800, #ffee00);
  border-radius: 3px;
  z-index: 5;
  animation: burn 3s linear forwards;
}
@keyframes burn {
  to {
    height: 0;
    background: #ff0000;
  }
}

/* EXPLOSION */
.explosion {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 0;
  height: 0;
  background: radial-gradient(circle, #ffff00, #ff8800, #ff0000, #000000);
  border-radius: 50%;
  z-index: 9999;
  pointer-events: none;
  animation: explode 0.7s forwards;
  box-shadow: 0 0 120px #ffff00;
}
@keyframes explode {
  0% { width: 0; height: 0; opacity: 1; }
  60% { width: 520px; height: 520px; }
  100% { width: 720px; height: 720px; opacity: 0; }
}

@keyframes flash {
  from { opacity: 0.4; filter: brightness(0.8); }
  to { opacity: 1; filter: brightness(1.3); }
}

.message {
  font-size: 23px;
  font-weight: 700;
  margin: 20px 0 8px;
  color: #c00;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.sub-message {
  font-size: 15px;
  color: #444;
  margin-bottom: 50px;
}

body {
  background: #fff !important;
  color: #0a0a0a !important;
  overflow: hidden;
}
</style>
<style>
body{background:#fff!important;color:#0a0a0a!important;}
.t-header{background:rgba(255,255,255,0.95)!important;border-bottom-color:rgba(0,0,0,0.07)!important;}
.t-logo{color:#0a0a0a!important;}.t-header-btn{color:#0a0a0a!important;}
.t-sidebar{background:#fff!important;border-right-color:rgba(0,0,0,0.07)!important;}
.t-sidebar-header{border-bottom-color:rgba(0,0,0,0.06)!important;color:#0a0a0a!important;}
.t-sidebar-nav a{color:rgba(0,0,0,0.65)!important;border-bottom-color:rgba(0,0,0,0.05)!important;}
.t-overlay{background:rgba(0,0,0,0.45)!important;}
.t-container{background:#fff!important;padding-bottom:80px!important;}
.t-card{background:#fff!important;border-color:rgba(0,0,0,0.07)!important;}
.t-input{background:#f8f8f8!important;border-color:rgba(0,0,0,0.1)!important;color:#0a0a0a!important;}
.t-input::placeholder{color:rgba(0,0,0,0.3)!important;}
.t-btn-primary{background:#0a0a0a!important;color:#fff!important;font-weight:900!important;}
.t-btn-outline{border-color:rgba(0,0,0,0.15)!important;color:#0a0a0a!important;background:transparent!important;}
.t-section-title{color:#0a0a0a!important;font-size:10px!important;letter-spacing:3px!important;font-weight:900!important;text-transform:uppercase!important;}
.t-footer{background:#0a0a0a!important;border-top-color:rgba(0,0,0,0.1)!important;color:rgba(255,255,255,0.4)!important;}
.t-footer a{color:rgba(255,255,255,0.4)!important;}
.t-spinner{border-color:rgba(0,0,0,0.08)!important;border-top-color:#0a0a0a!important;}
.t-empty{color:rgba(0,0,0,0.3)!important;}
.back-header{background:rgba(255,255,255,0.95)!important;border-bottom-color:rgba(0,0,0,0.07)!important;}
.back-header h2,.back-header h3{color:#0a0a0a!important;}
.back-btn{color:#0a0a0a!important;}
.t-modal-box{background:#fff!important;border:1px solid rgba(0,0,0,0.08)!important;box-shadow:0 8px 40px rgba(0,0,0,0.12)!important;}
.t-modal-box h3,.t-modal-box h2{color:#0a0a0a!important;}
h1,h2,h3{color:#0a0a0a;}
</style>
</head>
<body>

<div class="admin-header">
  <h1>ADMIN ACCESS</h1>
  <button class="t-header-btn" onclick="goHome()" id="homeBtn"></button>
</div>

<div class="admin-container">

  <!-- Flashing Warning Sign -->
  <div class="warning-sign" id="warningSign">
    <svg viewBox="0 0 512 472" xmlns="http://www.w3.org/2000/svg">
      <path fill="#ff0000" d="M256 20 L492 452 L20 452 Z" stroke="#8b0000" stroke-width="38" stroke-linejoin="round"/>
      <path fill="#ffffff" d="M256 160 L256 300" stroke="#8b0000" stroke-width="28" stroke-linecap="round"/>
      <circle cx="256" cy="370" r="28" fill="#8b0000"/>
    </svg>
  </div>

  <div class="bomb-container" id="bombContainer">
    <div class="fuse" id="fuse"></div>
    
    <!-- SVG Bomb (no background shadow behind) -->
    <svg class="bomb-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" id="bombSvg">
      <!-- Main bomb body -->
      <ellipse cx="100" cy="115" rx="68" ry="62" fill="#1a1a1a" stroke="#333" stroke-width="12"/>
      <!-- Highlight -->
      <ellipse cx="72" cy="88" rx="22" ry="18" fill="#444" opacity="0.6"/>
      <!-- Fuse base -->
      <rect x="98" y="48" width="8" height="22" rx="2" fill="#555"/>
      <!-- Fuse spark area -->
      <path d="M102 50 Q95 35 108 28" fill="none" stroke="#ff8800" stroke-width="7" stroke-linecap="round"/>
    </svg>

    <div class="timer" id="timer">3</div>
  </div>

  <div class="message">ACCESS DENIED</div>
  <div class="sub-message">You are not an administrator.<br>Timebomb activated.</div>

</div>

<script>
document.getElementById('shared').textContent = SHARED_CSS || '';
document.getElementById('homeBtn').innerHTML = '🏠'; // keep simple home

function goHome() {
  window.location.href = 'https://thumblyst.vercel.app';
}

// Timer (3 seconds)
let timeLeft = 3;
const timerEl = document.getElementById('timer');

const countdown = setInterval(() => {
  timeLeft--;
  timerEl.textContent = timeLeft;

  if (timeLeft <= 0) {
    clearInterval(countdown);
    
    // Explosion
    const explosion = document.createElement('div');
    explosion.className = 'explosion';
    document.body.appendChild(explosion);

    // Screen shake
    document.body.style.transition = 'transform 0.08s';
    let shakes = 0;
    const shakeInt = setInterval(() => {
      const dx = Math.random() * 26 - 13;
      const dy = Math.random() * 26 - 13;
      document.body.style.transform = `translate(${dx}px, ${dy}px)`;
      shakes++;
      if (shakes > 14) {
        clearInterval(shakeInt);
        document.body.style.transform = 'translate(0,0)';
      }
    }, 45);

    setTimeout(() => {
      explosion.remove();
      window.location.href = 'https://thumblyst.vercel.app';
    }, 750);
  }
}, 1000);

// Start timer immediately on page load
window.onload = () => {
  timerEl.textContent = '3';
};
</script>
</body>
</html>
