<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redeem | Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
.redeem-page {
  min-height:85vh; display:flex; align-items:center; justify-content:center; padding:20px;
}
.redeem-inner { width:100%; max-width:420px; }

.redeem-hero { text-align:center; margin-bottom:28px; }
.hero-icon-wrap {
  background:linear-gradient(135deg,rgba(0,240,255,0.1),rgba(192,38,211,0.1));
  border:1px solid var(--border2); width:72px; height:72px; border-radius:20px;
  display:flex; align-items:center; justify-content:center; margin:0 auto 20px;
  box-shadow:0 0 24px rgba(0,240,255,0.15);
}
.hero-icon-wrap svg { width:34px; height:34px; fill:var(--cyan); }
.redeem-hero h2 { font-family:var(--font-display); font-size:22px; font-weight:900; letter-spacing:2px; margin:0 0 8px; text-transform:uppercase; color:var(--text); }
.redeem-hero p { font-size:13px; color:var(--text2); font-weight:500; margin:0; }

.redeem-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:20px;
  padding:24px; box-shadow:0 16px 48px rgba(0,0,0,0.4);
}

.code-input {
  width:100%; padding:18px; box-sizing:border-box;
  background:var(--bg3); border:2px solid var(--border);
  border-radius:14px; font-family:var(--font-mono); font-size:18px; font-weight:700;
  letter-spacing:5px; color:var(--cyan); text-transform:uppercase; text-align:center;
  transition:var(--transition); outline:none; margin-bottom:12px;
}
.code-input:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,240,255,0.1), 0 0 16px rgba(0,240,255,0.15); }
.code-input::placeholder { color:var(--text3); letter-spacing:2px; }

.verify-btn {
  width:100%; padding:16px; background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  color:#000; border:none; border-radius:14px;
  font-family:var(--font-display); font-size:13px; font-weight:900;
  letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:var(--spring);
  box-shadow:0 0 20px rgba(0,240,255,0.3);
}
.verify-btn:active { transform:scale(0.97); }
.verify-btn:disabled { opacity:0.4; cursor:not-allowed; }

.status-msg { margin-top:14px; font-family:var(--font-display); font-size:11px; font-weight:800; display:none; padding:12px 16px; border-radius:10px; text-align:center; justify-content:center; align-items:center; gap:8px; letter-spacing:1.5px; }
.status-msg.show { display:flex; }
.status-msg.error { background:rgba(255,56,96,0.08); color:var(--red); border:1px solid rgba(255,56,96,0.2); }
.status-msg.success { background:rgba(0,255,136,0.07); color:var(--green); border:1px solid rgba(0,255,136,0.2); }

.claim-section { display:none; margin-top:20px; padding-top:20px; border-top:1px solid var(--border); }
.claim-section.show { display:block; animation:fadeUp 0.4s ease both; }

.claim-preview {
  background:var(--bg3); border:1px solid var(--border); border-radius:14px;
  padding:20px; margin-bottom:14px; text-align:center;
}
.cp-label { font-family:var(--font-display); font-size:9px; font-weight:800; color:var(--text3); text-transform:uppercase; letter-spacing:3px; margin-bottom:6px; }
.cp-title { font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--cyan); letter-spacing:3px; text-shadow:0 0 10px rgba(0,240,255,0.4); }

.claim-btn {
  width:100%; padding:16px; background:linear-gradient(135deg,var(--green),#00cc6a);
  color:#000; border:none; border-radius:14px;
  font-family:var(--font-display); font-size:13px; font-weight:900;
  letter-spacing:3px; text-transform:uppercase; cursor:pointer; transition:var(--spring);
  box-shadow:0 0 20px rgba(0,255,136,0.25); display:flex; align-items:center; justify-content:center; gap:8px;
}
.claim-btn:active { transform:scale(0.97); }

/* SUCCESS MODAL */
.t-modal-box .suc-icon {
  width:72px; height:72px; border-radius:50%;
  background:rgba(0,255,136,0.1); border:2px solid rgba(0,255,136,0.3);
  display:flex; align-items:center; justify-content:center; margin:0 auto 20px;
  box-shadow:0 0 24px rgba(0,255,136,0.2);
}
</style>
</head>
<body>
<div id="header"></div>

<div class="redeem-page">
  <div class="redeem-inner">
    <div class="redeem-hero t-fade">
      <div class="hero-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1a2.5 2.5 0 00-5 0c0 .35.07.69.18 1H11a2.5 2.5 0 00-5 0c0 .35.07.69.18 1H4c-1.11 0-2 .89-2 2v11c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z"/></svg>
      </div>
      <h2>Redeem Reward</h2>
      <p>Enter your code to unlock exclusive content</p>
    </div>

    <div class="redeem-card t-fade">
      <input class="code-input" id="redeemCodeInput" placeholder="ENTER CODE" maxlength="32" oninput="this.value=this.value.toUpperCase();clearMsg()" autocomplete="off" spellcheck="false">
      <button class="verify-btn" id="verifyBtn" onclick="verifyCode()">VERIFY CODE</button>
      <div class="status-msg" id="statusMsg"></div>
      <div class="claim-section" id="claimSection">
        <div class="claim-preview">
          <div class="cp-label">Reward Found</div>
          <div class="cp-title" id="rewardTitle">—</div>
        </div>
        <button class="claim-btn" id="claimBtn" onclick="claimReward()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z"/></svg>
          Claim Reward
        </button>
      </div>
    </div>
  </div>
</div>

<div class="t-modal" id="rewardModal">
  <div class="t-modal-box">
    <div class="suc-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h3>Claimed!</h3>
    <p style="margin-bottom:28px;color:var(--text2);font-size:14px;font-weight:500;line-height:1.6">Your reward has been added to your account.</p>
    <a id="rewardLink" target="_blank" style="display:block;padding:15px;background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000;text-decoration:none;border-radius:12px;font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;text-align:center">Access Content</a>
    <button style="margin-top:16px;background:none;border:none;color:var(--text3);font-family:var(--font-display);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px" onclick="document.getElementById('rewardModal').classList.remove('active')">CLOSE</button>
  </div>
</div>

<div id="footer"></div>

<script>
document.getElementById('shared').textContent = SHARED_CSS;
document.getElementById('header').innerHTML = headerHTML('REDEEM');
document.getElementById('footer').innerHTML = footerHTML();

// init
const overlay=document.getElementById('overlay'),sidebar=document.getElementById('sidebar');
window.toggleSidebar=()=>{sidebar.classList.toggle('active');overlay.classList.toggle('active');document.body.style.overflow=sidebar.classList.contains('active')?'hidden':'';};
if(overlay)overlay.addEventListener('click',toggleSidebar);

let app; try { app = firebase.app(); } catch(e) { firebase.initializeApp(firebaseConfig); }
const auth=firebase.auth(), db=firebase.firestore();
let USER=null, CURRENT_COUPON=null;

auth.onAuthStateChanged(u => {
  USER=u;
  if(!u) auth.signInAnonymously().catch(()=>{});
  if(u) {
    const cb=document.getElementById('cartBadge');
    if(cb) db.collection('users').doc(u.uid).collection('cart').onSnapshot(s=>{cb.textContent=s.size;cb.style.display=s.size>0?'flex':'none;'},()=>{});
  }
});

document.querySelectorAll('.t-fade').forEach(el =>
  new IntersectionObserver(([e])=>{if(e.isIntersecting)el.classList.add('visible');},{threshold:0.1}).observe(el));

function clearMsg() {
  document.getElementById('statusMsg').className='status-msg';
  document.getElementById('statusMsg').innerHTML='';
  document.getElementById('claimSection').classList.remove('show');
}
function showMsg(text,type) {
  const m=document.getElementById('statusMsg');
  m.innerHTML=`<span>${text}</span>`;
  m.className='status-msg show '+type;
}

async function verifyCode() {
  const code=document.getElementById('redeemCodeInput').value.trim().toUpperCase();
  if(!code){showMsg('Please enter a code','error');return;}
  const btn=document.getElementById('verifyBtn');
  btn.disabled=true; btn.textContent='VERIFYING...';
  try {
    const q=await db.collection('coupons').doc(code).get();
    if(!q.exists) { showMsg('Invalid or inactive code','error'); }
    else {
      const data=q.data();
      if(data.validUntil&&data.validUntil.toDate()<new Date()){showMsg('This code has expired','error');}
      else if(data.usedCount>=(data.maxUses||9999)){showMsg('Usage limit reached','error');}
      else if(USER&&data.usedBy&&data.usedBy.includes(USER.uid)){showMsg('Already claimed by you','error');}
      else {
        CURRENT_COUPON={id:q.id,...data};
        document.getElementById('rewardTitle').textContent=data.code||(data.discount+'% OFF');
        document.getElementById('claimSection').classList.add('show');
        showMsg('✓ Code verified!','success');
      }
    }
  } catch(e){showMsg('Error checking code','error');}
  btn.disabled=false; btn.textContent='VERIFY CODE';
}

async function claimReward() {
  if(!USER||USER.isAnonymous){showMsg('Please sign in first','error');setTimeout(()=>location.href='login.html',1200);return;}
  const btn=document.getElementById('claimBtn');
  btn.disabled=true; btn.innerHTML='<span>Claiming...</span>';
  try {
    const batch=db.batch();
    batch.update(db.collection('coupons').doc(CURRENT_COUPON.id),{usedCount:firebase.firestore.FieldValue.increment(1),usedBy:firebase.firestore.FieldValue.arrayUnion(USER.uid)});
    batch.set(db.collection('users').doc(USER.uid),{redeems:firebase.firestore.FieldValue.arrayUnion({code:CURRENT_COUPON.code||CURRENT_COUPON.id,date:new Date().toISOString()})},{merge:true});
    await batch.commit();
    document.getElementById('rewardLink').href=CURRENT_COUPON.link||'index.html';
    document.getElementById('rewardModal').classList.add('active');
    document.getElementById('claimSection').classList.remove('show');
    clearMsg();
    document.getElementById('redeemCodeInput').value='';
  } catch(e){showMsg('Claim failed. Try again.','error');}
  btn.disabled=false; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z"/></svg> Claim Reward';
}

// close modal backdrop
document.getElementById('rewardModal').addEventListener('click',e=>{if(e.target===document.getElementById('rewardModal'))document.getElementById('rewardModal').classList.remove('active');});

// auto-verify from URL
window.addEventListener('load',()=>{
  const code=new URLSearchParams(location.search).get('code');
  if(code){document.getElementById('redeemCodeInput').value=code.toUpperCase();setTimeout(verifyCode,600);}
});
</script>
</body>
</html>
