<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login | Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
body {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; background:var(--bg);
}
body::after {
  content:'';
  position:fixed; inset:0; z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,240,255,0.07), transparent),
             radial-gradient(ellipse 60% 50% at 90% 80%, rgba(192,38,211,0.06), transparent);
  pointer-events:none;
}
.login-wrap {
  width:100%; max-width:360px; padding:24px 20px 40px;
  position:relative; z-index:1; animation:fadeUp 0.5s ease both;
}
.login-logo {
  font-family:var(--font-display); font-size:28px; font-weight:900;
  letter-spacing:6px; text-align:center; margin-bottom:6px;
  color:var(--cyan); text-shadow:0 0 24px rgba(0,240,255,0.5);
}
.login-logo span { color:var(--text); }
.login-sub {
  font-family:var(--font-display); font-size:10px; font-weight:700;
  letter-spacing:3px; text-align:center; color:var(--text3);
  text-transform:uppercase; margin-bottom:32px;
}
.login-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; padding:28px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4), 0 0 40px rgba(0,240,255,0.04);
}
.google-btn {
  width:100%; padding:14px; border:1.5px solid var(--border2);
  border-radius:12px; background:var(--bg3);
  font-family:var(--font-display); font-size:13px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  gap:10px; transition:var(--transition); color:var(--text); letter-spacing:1px;
}
.google-btn:active { background:var(--bg4); border-color:var(--cyan); }
.google-btn img { width:20px; height:20px; }
.divider {
  display:flex; align-items:center; gap:12px;
  margin:20px 0; color:var(--text3); font-size:11px;
  font-family:var(--font-display); letter-spacing:2px;
}
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.login-link {
  margin-top:18px; font-size:13px; color:var(--text3);
  text-align:center; font-weight:500; font-family:var(--font-display); letter-spacing:0.5px;
}
.login-link a { color:var(--cyan); text-decoration:none; font-weight:700; }
.err-msg { display:none; color:var(--red); font-size:11px; font-family:var(--font-display); letter-spacing:1px; margin-top:10px; text-align:center; font-weight:700; }
.err-msg.show { display:block; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo"><span>THUMB</span>LYST</div>
  <div class="login-sub">Premium Gaming GFX</div>
  <div class="login-card">
    <button class="google-btn" onclick="googleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Continue with Google
    </button>
    <div class="divider">OR</div>
    <label class="t-label">Email</label>
    <input class="t-input" type="email" id="email" placeholder="your@email.com" autocomplete="email">
    <label class="t-label" style="margin-top:14px">Password</label>
    <input class="t-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')emailLogin()">
    <div class="err-msg" id="errMsg"></div>
    <button class="t-btn t-btn-primary" style="margin-top:20px" onclick="emailLogin()">SIGN IN</button>
    <p class="login-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>
</div>
<script>
document.getElementById('shared').textContent = SHARED_CSS;
let app; try { app = firebase.app(); } catch(e) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth();
function showErr(msg) { const e = document.getElementById('errMsg'); e.textContent = msg; e.classList.add('show'); }
function googleLogin() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .then(() => location.href='index.html').catch(e => showErr(e.message));
}
function emailLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  if (!email || !pass) { showErr('Fill in all fields'); return; }
  auth.signInWithEmailAndPassword(email, pass)
    .then(() => location.href='index.html').catch(e => showErr(e.message));
}
auth.onAuthStateChanged(u => { if (u && !u.isAnonymous) location.href = 'index.html'; });
</script>
</body>
</html>
