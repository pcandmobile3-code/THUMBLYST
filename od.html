<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order Details | Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
.od-card {
  background:var(--bg2); border-radius:var(--radius);
  border:1px solid var(--border); overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.od-thumb { width:100%; max-height:220px; object-fit:cover; background:var(--bg3); display:block; }
.od-info { padding:20px; display:flex; flex-direction:column; gap:10px; }
.od-info h3 {
  font-family:var(--font-display); font-size:18px; font-weight:800;
  color:var(--text); letter-spacing:1px; text-transform:uppercase;
}
.od-price { font-family:var(--font-mono); font-size:18px; color:var(--cyan); text-shadow:0 0 10px rgba(0,240,255,0.4); }
.od-meta { font-size:13px; color:var(--text2); font-weight:500; }
.od-ref { font-family:var(--font-mono); font-size:12px; color:var(--text3); }

/* Progress bar */
.progress-section { margin:8px 0; }
.progress-label {
  font-family:var(--font-display); font-size:9px; font-weight:700;
  letter-spacing:2px; color:var(--text3); text-transform:uppercase; margin-bottom:10px;
}
.progress-track {
  display:flex; align-items:center; gap:0; position:relative;
}
.prog-step {
  display:flex; flex-direction:column; align-items:center; flex:1; position:relative;
}
.prog-dot {
  width:24px; height:24px; border-radius:50%;
  border:2px solid var(--border2);
  background:var(--bg3); display:flex; align-items:center; justify-content:center;
  z-index:2; font-family:var(--font-display); font-size:9px; font-weight:800;
  transition:var(--transition);
}
.prog-dot.done { background:var(--cyan); border-color:var(--cyan); color:#000; box-shadow:0 0 12px rgba(0,240,255,0.5); }
.prog-dot.active { background:transparent; border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 10px rgba(0,240,255,0.3); animation:pulse 1.5s ease infinite; }
.prog-line {
  position:absolute; top:12px; left:50%; right:-50%;
  height:2px; background:var(--border); z-index:1;
}
.prog-line.done { background:linear-gradient(90deg,var(--cyan),var(--border)); }
.prog-step:last-child .prog-line { display:none; }
.prog-name {
  font-family:var(--font-display); font-size:8px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-top:7px; text-align:center;
}
.prog-name.done { color:var(--cyan); }
.prog-name.active { color:var(--text); }
</style>
</head>
<body>
<div class="back-header">
  <button class="back-btn" onclick="history.back()" id="backBtn" aria-label="Back"></button>
  <h2>Order Details</h2>
</div>

<div class="t-container" style="padding-top:16px" id="box">
  <div class="t-loader"><div class="t-spinner"></div></div>
</div>

<script>
document.getElementById('shared').textContent = SHARED_CSS;
document.getElementById('backBtn').innerHTML = ICONS.back;

let app;
try { app = firebase.app(); } catch(e) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth(), db = firebase.firestore();
const box = document.getElementById('box');
const oid = new URLSearchParams(location.search).get('oid');
const itemId = new URLSearchParams(location.search).get('item');

const STEPS = ['Verifying','Creating','Processing','Processed'];
const STEP_LABELS = ['Verify','Create','Process','Done'];

function getStepIndex(status) {
  const idx = STEPS.indexOf(status);
  return idx >= 0 ? idx : 0;
}

function statusClass(s) {
  if (s === 'Creating') return 't-status-creating';
  if (s === 'Processing') return 't-status-processing';
  if (s === 'Processed') return 't-status-processed';
  return 't-status-verifying';
}

function buildProgressHTML(status) {
  const cur = getStepIndex(status);
  return `<div class="progress-section">
    <div class="progress-label">Order Progress</div>
    <div class="progress-track">
      ${STEPS.map((s, i) => `<div class="prog-step">
        <div class="prog-line ${i < cur ? 'done' : ''}"></div>
        <div class="prog-dot ${i < cur ? 'done' : i === cur ? 'active' : ''}">
          ${i < cur ? '✓' : i+1}
        </div>
        <div class="prog-name ${i < cur ? 'done' : i === cur ? 'active' : ''}">${STEP_LABELS[i]}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

auth.onAuthStateChanged(async user => {
  if (!user || !oid || !itemId) { location.href = 'orders.html'; return; }

  try {
    const orderRef = db.collection('users').doc(user.uid).collection('orders').doc(oid);
    const itemRef = orderRef.collection('items').doc(itemId);
    const [itemSnap, orderSnap] = await Promise.all([itemRef.get(), orderRef.get()]);

    if (!itemSnap.exists || !orderSnap.exists) { box.innerHTML = '<div class="t-empty">Order not found</div>'; return; }

    const item = itemSnap.data(), o = orderSnap.data();
    const price = Number(item.Price||item.price||0);
    const img = item.Thumbnail||item.imageUrl||item.image||'';
    const status = o.status||'Verifying';

    box.innerHTML = `
      <div class="od-card">
        ${img ? `<img class="od-thumb" src="${img}" alt="${(item.Title||'').replace(/"/g,'&quot;')}" loading="eager" onerror="this.style.display='none'">` : ''}
        <div class="od-info">
          <h3>${item.Title||item.title||'Item'}</h3>
          <span class="od-price">&#8377;${price}</span>
          ${item.CustomText ? `<p class="od-meta">Custom Text: <strong style="color:var(--text)">${item.CustomText}</strong></p>` : ''}
          ${item.WhatsApp ? `<p class="od-meta">WhatsApp: <strong style="color:var(--text)">${item.WhatsApp}</strong></p>` : ''}
          <p class="od-ref">UPI Ref: ${o.paymentRef||'-'}</p>
          ${buildProgressHTML(status)}
          <span class="t-status ${statusClass(status)}">${status}</span>
          <button class="t-btn t-btn-danger" style="margin-top:12px" onclick="cancelOrder()">Cancel Order</button>
        </div>
      </div>`;

    window.cancelOrder = async () => {
      if (!confirm('Are you sure you want to cancel this order?')) return;
      try {
        await orderRef.delete();
        showToast('Order cancelled', 'info');
        setTimeout(() => location.href = 'orders.html', 800);
      } catch(e) { showToast('Could not cancel order', 'error'); }
    };
  } catch(e) { box.innerHTML = '<div class="t-empty">Could not load order</div>'; }
});
</script>
</body>
</html>
