<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products | Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
.list-header {
  padding: 20px 0 8px;
  animation: pageIn 0.4s ease both;
}
.list-cat-label {
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase; color: var(--text3);
}
.list-title {
  font-family: var(--font-display); font-size: 24px; font-weight: 900;
  color: var(--text); letter-spacing: 2px; text-transform: uppercase;
  margin-top: 4px;
  text-shadow: 0 0 20px rgba(0,240,255,0.2);
}

/* SEARCH BAR */
.list-search-wrap { position: relative; margin: 14px 0 4px; }
.list-search-wrap input {
  width: 100%; height: 44px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0 14px 0 42px;
  font-size: 14px; color: var(--text); font-family: var(--font-body);
  outline: none; transition: var(--transition); letter-spacing: 0.5px;
}
.list-search-wrap input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,240,255,0.1); }
.list-search-wrap input::placeholder { color: var(--text3); }
.list-search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text3); pointer-events: none;
}

/* GRID */
.listing-grid { display: flex; flex-direction: column; gap: 14px; padding: 12px 0 64px; }

/* CYBER PRODUCT CARD */
.p-card {
  display: block; text-decoration: none; color: var(--text);
  border-radius: var(--radius); overflow: hidden;
  background: var(--bg2); border: 1px solid var(--border);
  transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s, border-color 0.2s;
  position: relative;
}
.p-card:active { transform: scale(0.98); }
.p-card:hover { border-color: var(--border2); box-shadow: 0 8px 32px rgba(0,0,0,0.4), var(--glow-cyan); }

.p-img-wrap {
  position: relative; width: 100%; aspect-ratio: 16/9;
  background: var(--bg3); overflow: hidden;
}
.p-img-wrap img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 0; transition: opacity 0.5s ease; z-index: 2;
}
.p-img-wrap img.on { opacity: 1; }
.p-img-overlay {
  position: absolute; inset: 0; z-index: 4;
  background: linear-gradient(160deg, transparent 30%, rgba(0,0,0,0.7) 90%);
}
.p-live-badge {
  position: absolute; top: 10px; left: 10px; z-index: 6;
  background: var(--red); color: #fff;
  font-family: var(--font-display); font-size: 7px; font-weight: 800;
  letter-spacing: 2px; padding: 3px 8px; border-radius: 4px;
  text-transform: uppercase; box-shadow: 0 0 10px rgba(255,56,96,0.6);
  display: flex; align-items: center; gap: 4px;
}
.p-live-badge::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: #fff; animation: livePulse 1.2s ease-in-out infinite;
}
.p-no-img {
  position: absolute; inset: 0; z-index: 3; display: none;
  align-items: center; justify-content: center; flex-direction: column;
  gap: 8px; background: var(--bg3); padding: 16px;
}
.p-no-img.show { display: flex; }
.p-no-img span {
  color: var(--text3); font-family: var(--font-display); font-size: 10px;
  font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-align: center;
}
.p-img-title {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
  padding: 10px 14px;
  font-family: var(--font-display); font-size: 12px; font-weight: 800;
  color: #fff; letter-spacing: 1px; text-transform: uppercase;
  text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.p-info {
  padding: 12px 14px 0;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
.p-info h3 {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text); letter-spacing: 0.5px;
}
.price-tag {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  background: linear-gradient(135deg, var(--cyan), var(--cyan2));
  color: #000; padding: 4px 12px; border-radius: 20px;
  flex-shrink: 0; letter-spacing: 0.5px;
  box-shadow: 0 0 10px rgba(0,240,255,0.3);
}
.p-order-btn {
  width: 100%; padding: 11px; margin-top: 0;
  background: transparent; border: none;
  border-top: 1px solid var(--border);
  color: var(--cyan); font-family: var(--font-display);
  font-size: 9px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
  cursor: pointer; transition: var(--transition); display: block; text-align: center;
  text-decoration: none;
}
.p-order-btn:active { background: rgba(0,240,255,0.08); }
</style>
</head>
<body>
<div id="header"></div>
<div class="t-container">
  <div class="list-header">
    <div class="list-cat-label" id="catLabel">Category</div>
    <div class="list-title" id="pageTitle">Products</div>
  </div>
  <div class="list-search-wrap">
    <span class="list-search-icon" id="searchIcon"></span>
    <input type="search" id="searchInput" placeholder="Search products..." autocomplete="off" aria-label="Search products">
  </div>
  <div class="listing-grid" id="grid">
    <div class="t-loader"><div class="t-spinner"></div></div>
  </div>
</div>
<div id="footer"></div>
<script>
document.getElementById('shared').textContent = SHARED_CSS;
document.getElementById('header').innerHTML = headerHTML();
document.getElementById('footer').innerHTML = footerHTML();
document.getElementById('searchIcon').innerHTML = ICONS.search;
const { auth, db } = initApp();

const cat = new URLSearchParams(location.search).get('cat');
const NAMES = {ff:'Free Fire',bgmi:'BGMI',valo:'Valorant',explore:'Explore',overlay:'Overlays',backgrounds:'Backgrounds',bg:'Backgrounds',pfp:'Profile Pictures'};
const catName = NAMES[cat] || (cat ? cat.toUpperCase() : 'Products');
document.getElementById('catLabel').textContent = 'Category';
document.getElementById('pageTitle').textContent = catName;
document.title = catName + ' | Thumblyst';

const grid = document.getElementById('grid');
let allDocs = [];

// TYPE MAP for card decoration
const isLiveType = ['ff','bgmi','valo','explore'];
const isOverlayType = ['overlay','banner'];
const isPfpType = ['pfp'];
const isBgType = ['backgrounds','bg'];

function imgLoad(uid, url) {
  const img = document.getElementById('pim-'+uid), shim = document.getElementById('psh-'+uid), ni = document.getElementById('pni-'+uid);
  const fb = () => { if(shim) shim.classList.add('off'); if(ni) ni.classList.add('show'); };
  if (!url) { fb(); return; }
  img.onload = () => { img.classList.add('on'); if(shim) shim.classList.add('off'); };
  img.onerror = fb;
  img.src = url;
}

function renderCard(doc, i) {
  const d = doc.data(), uid = doc.id;
  const delay = (i * 0.045).toFixed(2);
  const showLive = isLiveType.includes(cat);
  const noImgSvg = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(0,240,255,0.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
  return `<a class="p-card t-fade" href="view.html?id=${uid}" style="transition-delay:${delay}s" aria-label="${d.title||'Product'}">
    <div class="p-img-wrap">
      <img id="pim-${uid}" alt="${(d.title||'').replace(/"/g,'&quot;')}" loading="lazy">
      <div class="shim" id="psh-${uid}"></div>
      <div class="p-no-img" id="pni-${uid}">${noImgSvg}<span>${d.title||catName}</span></div>
      <div class="p-img-overlay"></div>
      ${showLive ? '<div class="p-live-badge">LIVE</div>' : ''}
      <div class="p-img-title">${d.title||''}</div>
    </div>
    <div class="p-info">
      <h3>${d.title||'Untitled'}</h3>
      <span class="price-tag">&#8377;${d.price||0}</span>
    </div>
    <span class="p-order-btn">ORDER NOW</span>
  </a>`;
}

function renderAll(docs) {
  if (!docs.length) { grid.innerHTML = '<div class="t-empty">No products in this category yet</div>'; return; }
  grid.innerHTML = docs.map((doc, i) => renderCard(doc, i)).join('');
  docs.forEach(doc => imgLoad(doc.id, doc.data().imageUrl||null));
  document.querySelectorAll('.t-fade').forEach(el =>
    new IntersectionObserver(([e]) => { if(e.isIntersecting) el.classList.add('visible'); }, {threshold:0.05}).observe(el));
}

async function load() {
  if (!cat) { grid.innerHTML = '<div class="t-empty">Invalid category</div>'; return; }
  try {
    const snap = await db.collection('products').where('category','==',cat).get();
    allDocs = snap.docs.sort((a,b) => {
      const at = a.data().createdAt?.toMillis?.()??0, bt = b.data().createdAt?.toMillis?.()??0;
      return bt - at;
    });
    renderAll(allDocs);
  } catch(e) { grid.innerHTML = '<div class="t-empty">Could not load products</div>'; }
}

// LIVE SEARCH
let debounce;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { renderAll(allDocs); return; }
    const filtered = allDocs.filter(doc => {
      const d = doc.data();
      return (d.title||'').toLowerCase().includes(q) || (d.tags||'').toLowerCase().includes(q) || (d.description||'').toLowerCase().includes(q);
    });
    renderAll(filtered);
  }, 220);
});

load();
</script>
</body>
</html>
