<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
.page-title {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 20px 0 4px;
  color: var(--text-muted);
  animation: pageIn 0.4s ease both;
}
.listing-grid { display: flex; flex-direction: column; gap: 14px; padding: 12px 0 64px; }

.p-card {
  display: block;
  text-decoration: none;
  color: var(--text);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  background: #fff;
  border: 1px solid var(--border);
  transition: transform 0.22s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s ease;
}
.p-card:active { transform: scale(0.98); box-shadow: var(--shadow-sm); }

.p-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--bg-secondary);
  overflow: hidden;
}
.p-img-wrap img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 2;
}
.p-img-wrap img.on { opacity: 1; }
.p-no-img {
  position: absolute;
  inset: 0;
  z-index: 3;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  background: var(--bg-secondary);
  padding: 16px;
}
.p-no-img.show { display: flex; }
.p-no-img span {
  color: var(--text-muted);
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
}

.p-info {
  padding: 13px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.p-info h3 {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.price-tag {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  background: var(--text);
  color: #fff;
  padding: 5px 14px;
  border-radius: 20px;
  flex-shrink: 0;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div id="header"></div>
<div class="t-container">
  <div class="page-title" id="pageTitle"></div>
  <div class="listing-grid" id="grid">
    <div class="t-loader"><div class="t-spinner"></div></div>
  </div>
</div>
<div id="footer"></div>
<script>
document.getElementById('shared').textContent = SHARED_CSS;
document.getElementById('header').innerHTML = headerHTML();
document.getElementById('footer').innerHTML = footerHTML();
const { auth, db } = initApp();
const cat = new URLSearchParams(location.search).get('cat');
const NAMES = {ff:'Free Fire',bgmi:'BGMI',valo:'Valorant',explore:'Explore',overlay:'Overlays',backgrounds:'Backgrounds',bg:'Backgrounds',pfp:'Profile Pictures'};
const catName = NAMES[cat] || (cat ? cat.toUpperCase() : 'Products');
document.getElementById('pageTitle').textContent = catName;
document.title = catName + ' | Thumblyst';
const grid = document.getElementById('grid');

function loadImg(uid, url) {
  const img = document.getElementById('pim-'+uid), shim = document.getElementById('psh-'+uid), ni = document.getElementById('pni-'+uid);
  const fb = () => { if(shim) shim.classList.add('off'); if(ni) ni.classList.add('show'); };
  if (!url) { fb(); return; }
  img.onload = () => { img.classList.add('on'); if(shim) shim.classList.add('off'); };
  img.onerror = fb;
  img.src = url;
}

async function load() {
  if (!cat) { grid.innerHTML = '<div class="t-empty">Invalid category</div>'; return; }
  try {
    const snap = await db.collection('products').where('category','==',cat).get();
    if (snap.empty) { grid.innerHTML = '<div class="t-empty">No products in this category yet</div>'; return; }
    const docs = snap.docs.sort((a,b) => {
      const at = a.data().createdAt?.toMillis?.() ?? 0, bt = b.data().createdAt?.toMillis?.() ?? 0;
      return bt - at;
    });
    grid.innerHTML = '';
    const noImgSvg = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
    docs.forEach((doc, i) => {
      const d = doc.data(), uid = doc.id;
      const delay = (i * 0.05).toFixed(2);
      grid.innerHTML += `<a class="p-card t-fade" href="view.html?id=${uid}" style="transition-delay:${delay}s">
        <div class="p-img-wrap">
          <img id="pim-${uid}" alt="${d.title||''}">
          <div class="shim" id="psh-${uid}"></div>
          <div class="p-no-img" id="pni-${uid}">${noImgSvg}<span>${d.title||catName}</span></div>
        </div>
        <div class="p-info">
          <h3>${d.title||'Untitled'}</h3>
          <span class="price-tag">&#8377;${d.price||0}</span>
        </div>
      </a>`;
    });
    docs.forEach(doc => loadImg(doc.id, doc.data().imageUrl||null));
    document.querySelectorAll('.t-fade').forEach(el =>
      new IntersectionObserver(([e]) => { if(e.isIntersecting) el.classList.add('visible'); }, {threshold:0.05}).observe(el));
  } catch(e) { grid.innerHTML = '<div class="t-empty">Could not load products</div>'; }
}
load();
</script>
</body>
</html>
