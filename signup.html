<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign Up | Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
body::after {
  content:''; position:fixed; inset:0; z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(192,38,211,0.07),transparent),
             radial-gradient(ellipse 60% 50% at 10% 80%,rgba(0,240,255,0.06),transparent);
  pointer-events:none;
}
.login-wrap { width:100%; max-width:360px; padding:24px 20px 40px; position:relative; z-index:1; animation:fadeUp 0.5s ease both; }
.login-logo { font-family:var(--font-display); font-size:28px; font-weight:900; letter-spacing:6px; text-align:center; margin-bottom:6px; color:var(--purple); text-shadow:0 0 24px rgba(192,38,211,0.5); }
.login-logo span { color:var(--text); }
.login-sub { font-family:var(--font-display); font-size:10px; font-weight:700; letter-spacing:3px; text-align:center; color:var(--text3); text-transform:uppercase; margin-bottom:32px; }
.login-card { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:28px 24px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
.login-link { margin-top:18px; font-size:13px; color:var(--text3); text-align:center; font-family:var(--font-display); letter-spacing:0.5px; }
.login-link a { color:var(--purple); text-decoration:none; font-weight:700; }
.err-msg { display:none; color:var(--red); font-size:11px; font-family:var(--font-display); letter-spacing:1px; margin-top:10px; text-align:center; font-weight:700; }
.err-msg.show { display:block; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo"><span>THUMB</span>LYST</div>
  <div class="login-sub">Create Your Account</div>
  <div class="login-card">
    <label class="t-label">Email</label>
    <input class="t-input" type="email" id="email" placeholder="your@email.com" autocomplete="email">
    <label class="t-label" style="margin-top:14px">Password</label>
    <input class="t-input" type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
    <label class="t-label" style="margin-top:14px">Confirm Password</label>
    <input class="t-input" type="password" id="password2" placeholder="Repeat password" autocomplete="new-password" onkeydown="if(event.key==='Enter')signup()">
    <div class="err-msg" id="errMsg"></div>
    <button class="t-btn t-btn-purple" style="margin-top:20px" onclick="signup()">CREATE ACCOUNT</button>
    <p class="login-link">Already have an account? <a href="login.html">Sign In</a></p>
  </div>
</div>
<script>
document.getElementById('shared').textContent = SHARED_CSS;
let app; try { app = firebase.app(); } catch(e) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth();
function showErr(msg) { const e = document.getElementById('errMsg'); e.textContent = msg; e.classList.add('show'); }
function signup() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const pass2 = document.getElementById('password2').value;
  if (!email || !pass) { showErr('Fill in all fields'); return; }
  if (pass !== pass2) { showErr('Passwords do not match'); return; }
  if (pass.length < 6) { showErr('Password must be at least 6 characters'); return; }
  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => location.href='index.html').catch(e => showErr(e.message));
}
auth.onAuthStateChanged(u => { if (u && !u.isAnonymous) location.href = 'index.html'; });
</script>
</body>
</html>
