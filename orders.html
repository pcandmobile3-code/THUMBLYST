<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Orders | Thumblyst</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<style id="shared"></style>
<style>
.order-card {
  background:var(--bg2); border-radius:var(--radius);
  border:1px solid var(--border); overflow:hidden;
  margin-bottom:14px; cursor:pointer; transition:var(--transition);
}
.order-card:active { transform:scale(0.98); }
.order-card:hover { border-color:var(--border2); box-shadow:0 4px 24px rgba(0,0,0,0.4); }
.order-thumb {
  width:100%; max-height:160px; object-fit:cover;
  background:var(--bg3); display:block;
}
.order-info { padding:14px 16px; display:flex; flex-direction:column; gap:6px; }
.order-info h4 {
  font-family:var(--font-display); font-size:14px; font-weight:800;
  color:var(--text); letter-spacing:0.5px;
}
.order-price { font-family:var(--font-mono); font-size:14px; color:var(--cyan); }
.order-meta { font-size:11px; color:var(--text3); font-weight:500; }
.order-footer { display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
.sign-in-prompt {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:60px 20px; text-align:center; gap:16px;
}
.sign-in-prompt h3 { font-family:var(--font-display); font-size:18px; font-weight:800; color:var(--text); letter-spacing:2px; }
.sign-in-prompt p { font-size:13px; color:var(--text2); }
</style>
</head>
<body>
<div class="back-header">
  <button class="back-btn" onclick="location.href='index.html'" id="backBtn" aria-label="Home"></button>
  <h2>My Orders</h2>
</div>

<div class="t-container" style="padding-top:16px" id="ordersBox">
  <div class="t-loader"><div class="t-spinner"></div></div>
</div>

<script>
document.getElementById('shared').textContent = SHARED_CSS;
document.getElementById('backBtn').innerHTML = ICONS.home;

let app;
try { app = firebase.app(); } catch(e) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth(), db = firebase.firestore();
const ordersBox = document.getElementById('ordersBox');

function statusClass(s) {
  if (s === 'Creating') return 't-status-creating';
  if (s === 'Processing') return 't-status-processing';
  if (s === 'Processed') return 't-status-processed';
  return 't-status-verifying';
}

auth.onAuthStateChanged(user => {
  if (!user || user.isAnonymous) {
    ordersBox.innerHTML = `<div class="sign-in-prompt">
      <div style="width:64px;height:64px;border-radius:50%;background:rgba(0,240,255,0.08);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center">${ICONS.user}</div>
      <h3>Sign In to View Orders</h3>
      <p>Track your orders and get updates on your GFX</p>
      <button class="t-btn t-btn-primary" style="max-width:220px" onclick="location.href='login.html'">SIGN IN</button>
    </div>`;
    return;
  }
  loadOrders(user.uid);
});

async function loadOrders(uid) {
  try {
    const snap = await db.collection('users').doc(uid).collection('orders').get();
    const docs = snap.docs.sort((a,b) => (b.data().createdAt?.toMillis?.()??0) - (a.data().createdAt?.toMillis?.()??0));

    if (!docs.length) { ordersBox.innerHTML = '<div class="t-empty">No orders yet.<br>Start shopping!</div>'; return; }
    ordersBox.innerHTML = '';

    for (const orderDoc of docs) {
      const o = orderDoc.data();
      const oid = orderDoc.id;
      try {
        const itemsSnap = await orderDoc.ref.collection('items').get();
        itemsSnap.forEach(itemDoc => {
          const item = itemDoc.data();
          const price = Number(item.Price||item.price||0);
          const img = item.Thumbnail||item.imageUrl||item.image||'';
          const status = o.status||'Verifying';
          ordersBox.innerHTML += `
            <div class="order-card t-fade" onclick="location.href='od.html?oid=${oid}&item=${itemDoc.id}'" role="button" tabindex="0" aria-label="${item.Title||'Order'}">
              ${img ? `<img class="order-thumb" src="${img}" alt="${(item.Title||'').replace(/"/g,'&quot;')}" loading="lazy" onerror="this.style.display='none'">` : ''}
              <div class="order-info">
                <h4>${item.Title||item.title||'Item'}</h4>
                <span class="order-price">&#8377;${price}</span>
                ${item.CustomText ? `<span class="order-meta">Text: ${item.CustomText}</span>` : ''}
                <div class="order-footer">
                  <span class="t-status ${statusClass(status)}">${status}</span>
                  <span style="font-size:10px;color:var(--text3);font-family:var(--font-display);letter-spacing:1px">VIEW DETAILS →</span>
                </div>
              </div>
            </div>`;
        });
      } catch(_) {}
    }

    document.querySelectorAll('.t-fade').forEach(el =>
      new IntersectionObserver(([e])=>{if(e.isIntersecting)el.classList.add('visible');},{threshold:0.05}).observe(el));
  } catch(e) { ordersBox.innerHTML = '<div class="t-empty">Could not load orders</div>'; }
}
</script>
</body>
</html>
